name: reusable-release

on:
  workflow_call:
    inputs:
      qemu_version:
        description: "QEMU version to build, without the leading v"
        required: true
        type: string
      release_tag:
        description: "Release tag to publish"
        required: false
        default: ""
        type: string
      qemu_repo:
        description: "QEMU git repository"
        required: false
        default: "https://gitlab.com/qemu-project/qemu.git"
        type: string
      qemu_ref:
        description: "QEMU git ref to build; defaults to v<qemu_version>"
        required: false
        default: ""
        type: string
      alpine_version:
        description: "Alpine version used by the build container"
        required: false
        default: "3.23.4"
        type: string
      artifact_serial:
        description: "Optional serial suffix appended to artifact version"
        required: false
        default: ""
        type: string
      publish:
        description: "Publish built artifacts to a GitHub Release"
        required: false
        default: true
        type: boolean
      attest:
        description: "Generate GitHub artifact attestations"
        required: false
        default: true
        type: boolean

concurrency:
  group: qemu-static-release-${{ inputs.release_tag || inputs.qemu_version }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    permissions:
      contents: read
      attestations: write
      id-token: write
    with:
      qemu_version: ${{ inputs.qemu_version }}
      qemu_repo: ${{ inputs.qemu_repo }}
      qemu_ref: ${{ inputs.qemu_ref }}
      alpine_version: ${{ inputs.alpine_version }}
      artifact_serial: ${{ inputs.artifact_serial }}
      attest: ${{ inputs.attest }}

  publish:
    needs: build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-24.04
    concurrency:
      group: qemu-static-release-publish
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download workflow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: qemu-*-${{ inputs.qemu_version }}-*
          path: out
          merge-multiple: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.release_tag || inputs.qemu_version }}
        run: |
          mapfile -t assets < <(find out -maxdepth 1 -type f | sort)
          tools/create-release.sh "${TAG_NAME}" "${assets[@]}"
