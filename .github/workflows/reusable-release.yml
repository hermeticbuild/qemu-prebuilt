name: reusable-release

on:
  workflow_call:
    inputs:
      qemu_version:
        description: "QEMU version to build, without the leading v"
        required: true
        type: string
      release_tag:
        description: "Release tag to publish"
        required: false
        default: ""
        type: string
      qemu_repo:
        description: "QEMU git repository"
        required: false
        default: "https://gitlab.com/qemu-project/qemu.git"
        type: string
      qemu_ref:
        description: "QEMU git ref to build; defaults to v<qemu_version>"
        required: false
        default: ""
        type: string
      alpine_version:
        description: "Alpine version used by the build container"
        required: false
        default: "3.23.4"
        type: string
      artifact_serial:
        description: "Optional serial suffix appended to artifact version"
        required: false
        default: ""
        type: string
      publish:
        description: "Publish built artifacts to a GitHub Release"
        required: false
        default: true
        type: boolean
      attest:
        description: "Generate GitHub artifact attestations"
        required: false
        default: true
        type: boolean

concurrency:
  group: qemu-static-${{ github.workflow }}-${{ inputs.release_tag || inputs.qemu_version }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build qemu-static
        id: build
        env:
          ALPINE_VERSION: ${{ inputs.alpine_version }}
          ARTIFACT_SERIAL: ${{ inputs.artifact_serial }}
          QEMU_REF: ${{ inputs.qemu_ref }}
          QEMU_REPO: ${{ inputs.qemu_repo }}
          QEMU_VERSION: ${{ inputs.qemu_version }}
        run: |
          case "${{ matrix.os }}" in
            linux)
              tools/build-qemu.sh "${{ matrix.arch }}" "${{ inputs.qemu_version }}"
              ;;
            *)
              echo "unsupported matrix os: ${{ matrix.os }}" >&2
              exit 1
              ;;
          esac

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-${{ matrix.os }}-${{ inputs.qemu_version }}-${{ matrix.arch }}
          path: |
            out/qemu-*
          if-no-files-found: error

      - name: Attest release artifact
        if: ${{ inputs.attest }}
        id: attest
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            out/qemu-*

      - name: Normalize attestation bundle filename
        if: ${{ inputs.attest }}
        run: |
          mv \
            "${{ steps.attest.outputs.bundle-path }}" \
            "out/${{ steps.build.outputs.attestation_name }}"

      - name: Upload attestation bundle artifact
        if: ${{ inputs.attest }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-${{ matrix.os }}-${{ inputs.qemu_version }}-${{ matrix.arch }}.attestation
          path: out/${{ steps.build.outputs.attestation_name }}
          if-no-files-found: error

  publish:
    needs: build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-24.04
    concurrency:
      group: qemu-static-release-publish
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download workflow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: qemu-*-${{ inputs.qemu_version }}-*
          path: out
          merge-multiple: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.release_tag || inputs.qemu_version }}
        run: |
          mapfile -t assets < <(find out -maxdepth 1 -type f | sort)
          tools/create-release.sh "${TAG_NAME}" "${assets[@]}"
